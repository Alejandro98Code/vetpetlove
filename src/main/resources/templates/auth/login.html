<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar sesión · PetLove</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary:   { DEFAULT: '#4F7942', light: '#6AAF5A', dark: '#3A5C30' },
                        secondary: '#F5A623',
                        cream:     '#FDFAF4',
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'Georgia', 'serif'],
                        body:    ['"Inter"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="bg-cream font-body min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-sm">

        <!-- Logo -->
        <div class="text-center mb-8">
            <span class="text-5xl">🐾</span>
            <h1 class="font-display text-primary text-3xl font-bold mt-2">PetLove</h1>
            <p class="text-gray-500 text-sm mt-1">Cuidamos lo que más quieres</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <h2 class="font-display text-2xl font-semibold text-gray-800 mb-6">Bienvenido de vuelta</h2>

            <!-- Alertas -->
            <div th:if="${param.error}"
                 class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
                Email o contraseña incorrectos.
            </div>
            <div th:if="${param.registrado}"
                 class="mb-4 px-4 py-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm">
                Cuenta creada exitosamente. Ya puedes iniciar sesión.
            </div>
            <div th:if="${param.logout}"
                 class="mb-4 px-4 py-3 bg-blue-50 border border-blue-200 rounded-lg text-blue-700 text-sm">
                Sesión cerrada correctamente.
            </div>

            <!-- Formulario -->
            <form th:action="@{/auth/login}" method="post" class="space-y-4">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" placeholder="tu@email.com" required
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" name="password" placeholder="••••••••" required
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>

                <button type="submit"
                        class="w-full bg-primary hover:bg-primary-dark text-white font-semibold
                               py-2.5 rounded-lg transition-colors text-sm mt-2">
                    Entrar
                </button>
            </form>
        </div>

        <!-- Registro -->
        <p class="text-center text-sm text-gray-500 mt-6">
            ¿No tienes cuenta?
            <a th:href="@{/auth/register}" class="text-primary font-medium hover:underline">
                Regístrate aquí
            </a>
        </p>

    </div>
</body>
</html>
