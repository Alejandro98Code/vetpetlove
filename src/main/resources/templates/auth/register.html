<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Crear cuenta · PetLove</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary:   { DEFAULT: '#4F7942', light: '#6AAF5A', dark: '#3A5C30' },
                        secondary: '#F5A623',
                        cream:     '#FDFAF4',
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'Georgia', 'serif'],
                        body:    ['"Inter"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="bg-cream font-body min-h-screen flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <span class="text-5xl">🐾</span>
            <h1 class="font-display text-primary text-3xl font-bold mt-2">PetLove</h1>
            <p class="text-gray-500 text-sm mt-1">Crea tu cuenta y cuida a tu mascota</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
            <h2 class="font-display text-2xl font-semibold text-gray-800 mb-6">Crear cuenta</h2>

            <!-- Error -->
            <div th:if="${error}" th:text="${error}"
                 class="mb-5 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
            </div>

            <form th:action="@{/auth/register}" method="post" class="space-y-4">

                <!-- Nombre + Apellido -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                        <input type="text" name="nombre" placeholder="Ana" required
                               class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      text-sm transition"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
                        <input type="text" name="apellido" placeholder="García" required
                               class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      text-sm transition"/>
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" placeholder="tu@email.com" required
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>

                <!-- Contraseña -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" name="password" placeholder="Mínimo 8 caracteres" required
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>

                <!-- Teléfono -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Teléfono <span class="text-gray-400 font-normal">(opcional)</span>
                    </label>
                    <input type="text" name="telefono" placeholder="+51 999 000 000"
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>

                <!-- Dirección -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Dirección <span class="text-gray-400 font-normal">(opcional)</span>
                    </label>
                    <input type="text" name="direccion" placeholder="Av. Los Olivos 123, Lima"
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>

                <button type="submit"
                        class="w-full bg-primary hover:bg-primary-dark text-white font-semibold
                               py-2.5 rounded-lg transition-colors text-sm mt-2">
                    Crear cuenta
                </button>

            </form>
        </div>

        <!-- Login -->
        <p class="text-center text-sm text-gray-500 mt-6">
            ¿Ya tienes cuenta?
            <a th:href="@{/auth/login}" class="text-primary font-medium hover:underline">
                Inicia sesión
            </a>
        </p>

    </div>
</body>
</html>
