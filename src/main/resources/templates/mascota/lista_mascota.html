<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head><title>Pets · PetLove</title></head>
<body>
<main>

    <!-- Header -->
    <div class="flex items-start justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Mis mascotas</h1>
            <p class="text-sm text-gray-400 mt-1">Gestiona el perfil de cada una.</p>
        </div>
        <a th:href="@{/mascotas/nueva}"
           style="background-color: #1A73E8;"
           class="flex items-center gap-2 text-white text-sm font-semibold
                  px-5 py-2.5 rounded-lg transition-colors shadow-sm hover:opacity-90">
            + Registrar mascota
        </a>
    </div>

    <!-- Alertas -->
    <div th:if="${param.creada}"
         class="mb-6 px-4 py-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg">
        ✅ Mascota registrada correctamente.
    </div>
    <div th:if="${param.eliminada}"
         class="mb-6 px-4 py-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg">
        Mascota eliminada.
    </div>
    <div th:if="${param.actualizada}"
         class="mb-6 px-4 py-3 bg-blue-50 border border-blue-200 text-blue-700 text-sm rounded-lg">
        ✅ Mascota actualizada correctamente.
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(mascotas)}"
         class="bg-white rounded-2xl border border-gray-100 shadow-sm p-16 text-center">
        <div class="text-5xl mb-4">🐾</div>
        <h2 class="font-semibold text-gray-700 mb-2">Sin mascotas aún</h2>
        <p class="text-sm text-gray-400 mb-6">Agrega tu primera mascota para empezar.</p>
        <a th:href="@{/mascotas/nueva}"
           class="inline-block bg-petblue hover:bg-petblue-dark text-white text-sm font-semibold
                  px-6 py-2.5 rounded-lg transition-colors">
            Registrar mascota
        </a>
    </div>

    <!-- Grid -->
    <div th:unless="${#lists.isEmpty(mascotas)}"
         class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">

        <div th:each="m : ${mascotas}"
             class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden hover:shadow-md transition-shadow">

            <!-- Emoji grande centrado -->
            <div class="flex items-center justify-center pt-8 pb-4 bg-white">
                <span class="text-6xl"
                      th:text="${m.especie == 'Perro'} ? '🐶' : (${m.especie == 'Gato'} ? '🐱' : (${m.especie == 'Ave'} ? '🐦' : '🐾'))">🐾</span>
            </div>

            <!-- Info -->
            <div class="px-5 pb-5">
                <h3 class="font-bold text-gray-800 text-base mb-1" th:text="${m.nombre}">Max</h3>
                <p class="text-sm text-gray-500 mb-0.5">
                    <span th:text="${m.especie}">Perro</span>
                    <span th:if="${m.raza}"> · <span th:text="${m.raza}">Labrador</span></span>
                </p>
                <p class="text-xs text-gray-400 mb-5"
                   th:if="${m.fechaNacimiento != null}"
                   th:text="'Nacimiento: ' + ${#temporals.format(m.fechaNacimiento, 'dd/MM/yyyy')}">
                    Nacimiento: 01/01/2022
                </p>

                <!-- Botones -->
                <div class="flex gap-2 mt-auto">
                    <a th:href="@{/mascotas/{id}/editar(id=${m.id})}"
                       class="flex-1 text-center text-sm font-medium text-gray-600 border border-gray-200
                              py-2 rounded-lg hover:bg-gray-50 transition-colors">
                        Editar
                    </a>
                    <form th:action="@{/mascotas/{id}/eliminar(id=${m.id})}" method="post">
                        <button type="submit"
                                onclick="return confirm('¿Eliminar a esta mascota?')"
                                class="w-9 h-9 flex items-center justify-center border border-red-100
                                       text-red-400 rounded-lg hover:bg-red-50 transition-colors text-sm">
                            ✕
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</main>
</body>
</html>
