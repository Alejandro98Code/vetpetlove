<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${mascota.id} ? 'Editar mascota · PetLove' : 'Nueva mascota · PetLove'">Mascota · PetLove</title>
</head>
<body>
<main>

    <div class="max-w-xl mx-auto">

        <!-- Breadcrumb -->
        <nav class="text-sm text-gray-400 mb-6 flex items-center gap-2">
            <a th:href="@{/cliente/mascotasotas}" class="hover:text-primary transition-colors">Mis mascotas</a>
            <span>›</span>
            <span class="text-gray-600"
                  th:text="${mascota.id} ? 'Editar' : 'Nueva mascota'">Nueva mascota</span>
        </nav>

        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">

            <div class="flex items-center gap-3 mb-6">
                <span class="text-3xl">🐾</span>
                <h1 class="font-display text-2xl font-semibold text-gray-800"
                    th:text="${mascota.id} ? 'Editar mascota' : 'Nueva mascota'">Nueva mascota</h1>
            </div>

            <!-- Error -->
            <div th:if="${error}" th:text="${error}"
                 class="mb-5 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
            </div>

            <form th:action="${mascota.id} ? @{/mascotas/{id}/editar(id=${mascota.id})} : @{/mascotas/nueva}"
                  th:object="${mascota}" method="post" class="space-y-5">

                <!-- Nombre -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la mascota</label>
                    <input type="text" th:field="*{nombre}" placeholder="Max" required
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>

                <!-- Especie + Raza -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Especie</label>
                        <select th:field="*{especie}" required
                                class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                       focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                       text-sm transition">
                            <option value="">Seleccionar</option>
                            <option value="Perro">Perro 🐶</option>
                            <option value="Gato">Gato 🐱</option>
                            <option value="Ave">Ave 🐦</option>
                            <option value="Conejo">Conejo 🐰</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Raza</label>
                        <input type="text" th:field="*{raza}" placeholder="Labrador"
                               class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      text-sm transition"/>
                    </div>
                </div>

                <!-- Fecha de Nacimiento + Peso -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de nacimiento</label>
                        <input type="date" th:field="*{fechaNacimiento}"
                               class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      text-sm transition"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Peso (kg)</label>
                        <input type="number" th:field="*{peso}" placeholder="12.5" step="0.1" min="0"
                               class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      text-sm transition"/>
                    </div>
                </div>

                <!-- Sexo — valores deben coincidir con el enum: MACHO / HEMBRA -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Sexo</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" th:field="*{sexo}" value="MACHO"
                                   class="text-primary focus:ring-primary"/>
                            <span class="text-sm text-gray-700">Macho</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" th:field="*{sexo}" value="HEMBRA"
                                   class="text-primary focus:ring-primary"/>
                            <span class="text-sm text-gray-700">Hembra</span>
                        </label>
                    </div>
                </div>

                <!-- Botones -->
                <div class="flex gap-3 pt-2">
                    <button type="submit"
                            class="flex-1 bg-primary hover:bg-primary-dark text-white font-semibold
                                   py-2.5 rounded-lg transition-colors text-sm">
                        Guardar mascota
                    </button>
                    <a th:href="@{/cliente/mascotasotas}"
                       class="flex-1 text-center text-sm font-medium text-gray-600 border border-gray-200
                              py-2.5 rounded-lg hover:bg-gray-50 transition-colors">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>

</main>
</body>
</html>
