<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head>
    <title>Mis Citas · PetLove</title>
</head>
<body>
<main>

    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="font-display text-3xl font-bold text-gray-800">Mis Citas</h1>
            <p class="text-gray-500 text-sm mt-1">Historial de todas tus consultas.</p>
        </div>
        <a th:href="@{/citas/nueva}"
           class="bg-primary hover:bg-primary-dark text-white text-sm font-semibold
                  px-5 py-2.5 rounded-xl transition-colors">
            + Agendar cita
        </a>
    </div>

    <!-- Vacío -->
    <div th:if="${#lists.isEmpty(citas)}"
         class="bg-white rounded-2xl border border-gray-100 shadow-sm p-16 text-center">
        <span class="text-5xl block mb-3">📭</span>
        <h2 class="font-display text-lg font-semibold text-gray-700 mb-2">Sin citas aún</h2>
        <p class="text-gray-400 text-sm mb-6">Agenda una cita para tu mascota.</p>
        <a th:href="@{/citas/nueva}"
           class="inline-block bg-primary hover:bg-primary-dark text-white text-sm font-semibold
                  px-6 py-2.5 rounded-xl transition-colors">
            Agendar cita
        </a>
    </div>

    <!-- Tabla -->
    <div th:unless="${#lists.isEmpty(citas)}"
         class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-100">
                <tr class="text-xs text-gray-400 uppercase tracking-wide">
                    <th class="text-left px-6 py-4 font-medium">Mascota</th>
                    <th class="text-left px-6 py-4 font-medium">Motivo</th>
                    <th class="text-left px-6 py-4 font-medium">Fecha y hora</th>
                    <th class="text-left px-6 py-4 font-medium">Veterinario</th>
                    <th class="text-left px-6 py-4 font-medium">Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${citas}"
                    class="border-b border-gray-50 last:border-0 hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 font-medium text-gray-800"
                        th:text="${c.mascota.nombre}">Max</td>
                    <td class="px-6 py-4 text-gray-600"
                        th:text="${c.motivo ?: '—'}">Consulta</td>
                    <td class="px-6 py-4 text-gray-600"
                        th:text="${#temporals.format(c.fechaHora, 'dd/MM/yyyy HH:mm')}">01/01/2025</td>
                    <td class="px-6 py-4 text-gray-500"
                        th:text="${c.veterinario != null ? c.veterinario.nombre + ' ' + c.veterinario.apellido : '—'}">Dr. López</td>
                    <td class="px-6 py-4">
                        <span th:text="${c.estado}"
                              th:classappend="${c.estado.name() == 'COMPLETADA'} ? 'bg-green-100 text-green-700' :
                                             (${c.estado.name() == 'CANCELADA'} ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700')"
                              class="px-2.5 py-1 rounded-full text-xs font-semibold">
                            Pendiente
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>
</body>
</html>
