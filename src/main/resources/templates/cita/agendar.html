<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head>
    <title>Agendar cita · PetLove</title>
</head>
<body>
<main>

    <div class="max-w-xl mx-auto">

        <nav class="text-sm text-gray-400 mb-6 flex items-center gap-2">
            <a th:href="@{/cliente/citas}" class="hover:text-primary transition-colors">Mis citas</a>
            <span>›</span>
            <span class="text-gray-600">Agendar</span>
        </nav>

        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">

            <div class="flex items-center gap-3 mb-6">
                <span class="text-3xl">📅</span>
                <h1 class="font-display text-2xl font-semibold text-gray-800">Agendar cita</h1>
            </div>

            <div th:if="${error}" th:text="${error}"
                 class="mb-5 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
            </div>

            <!-- Sin @th:object — usamos name= directos para coincidir con @RequestParam -->
            <form th:action="@{/cita/agendar}" method="post" class="space-y-5">

                <!-- Mascota -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mascota</label>
                    <select name="mascotaId" required
                            class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                   focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                   text-sm transition">
                        <option value="">Seleccionar mascota</option>
                        <option th:each="m : ${mascotas}"
                                th:value="${m.id}"
                                th:text="${m.nombre} + ' (' + ${m.especie} + ')'"
                                th:selected="${mascotaIdSeleccionada != null and mascotaIdSeleccionada == m.id}">
                            Max (Perro)
                        </option>
                    </select>
                </div>

                <!-- Veterinario -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Veterinario</label>
                    <select name="veterinarioId" required
                            class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                   focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                   text-sm transition">
                        <option value="">Seleccionar veterinario</option>
                        <option th:each="v : ${veterinarios}"
                                th:value="${v.id}"
                                th:text="${v.nombre} + ' ' + ${v.apellido}">
                            Dr. López
                        </option>
                    </select>
                </div>

                <!-- Fecha y hora -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha y hora</label>
                    <input type="datetime-local" name="fechaHora" required
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>

                <!-- Motivo -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Motivo</label>
                    <textarea name="motivo" rows="3"
                              placeholder="Síntomas, motivo de la consulta..."
                              class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                     focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                     text-sm transition resize-none"></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="submit"
                            class="flex-1 bg-primary hover:bg-primary-dark text-white font-semibold
                                   py-2.5 rounded-lg transition-colors text-sm">
                        Confirmar cita
                    </button>
                    <a th:href="@{/cliente/citas}"
                       class="flex-1 text-center text-sm font-medium text-gray-600 border border-gray-200
                              py-2.5 rounded-lg hover:bg-gray-50 transition-colors">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>

</main>
</body>
</html>
