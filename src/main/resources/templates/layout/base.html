<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, main)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">PetLove</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        petblue:  { DEFAULT: '#1A73E8', light: '#E8F0FE', dark: '#1557B0' },
                        petgreen: { DEFAULT: '#00BFA5', light: '#E0F7F4', dark: '#008C7A' },
                        petgray:  { DEFAULT: '#F8F9FA', border: '#E8EAED', text: '#5F6368' },
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#F8F9FA] font-sans text-gray-800 min-h-screen flex">

    <!-- SIDEBAR -->
    <aside class="w-56 min-h-screen bg-white border-r border-gray-100 flex flex-col fixed top-0 left-0 z-40">
        <!-- Brand -->
        <div class="px-5 py-5 border-b border-gray-100">
            <p class="text-xs font-semibold text-petblue tracking-wide uppercase">PetLove</p>
            <p class="text-[11px] text-gray-400 mt-0.5">Veterinary Portal</p>
        </div>

        <!-- Nav -->
        <nav class="flex-1 px-3 py-4 space-y-0.5">
            <a th:href="@{/dashboard}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-petblue-light hover:text-petblue transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Dashboard
            </a>
            <a th:href="@{/cliente/mascotas}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-petblue-light hover:text-petblue transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.5 12.5c0-1 .5-2 1.5-2.5M9 7c0-1.5 1-3 2.5-3S14 5.5 14 7m-5 0v1m5-1v1m-7 4.5C7 14 8.5 16 10 16s3-2 3-3.5"/></svg>
                Pets
            </a>
            <a th:href="@{/cliente/citas}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-petblue-light hover:text-petblue transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path stroke-linecap="round" stroke-width="2" d="M16 2v4M8 2v4M3 10h18"/></svg>
                Appointments
            </a>
            <a th:href="@{/admin/usuarios}"
               th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-petblue-light hover:text-petblue transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zm10 1v6m3-3h-6"/></svg>
                Usuarios
            </a>
        </nav>

        <!-- Bottom actions -->
        <div class="px-3 py-4 border-t border-gray-100 space-y-0.5">
            <a th:href="@{/citas/nueva}"
               class="flex items-center gap-2 w-full bg-petblue hover:bg-petblue-dark text-white text-sm font-semibold
                      px-3 py-2.5 rounded-lg transition-colors mb-3">
                <span class="text-base">+</span> New Appointment
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-500 hover:text-gray-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v4m0 4h.01"/></svg>
                Help
            </a>
            <form th:action="@{/auth/logout}" method="post">
                <button type="submit" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-500 hover:text-red-500 transition-colors w-full text-left">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
                    Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- CONTENT -->
    <div class="ml-56 flex-1 min-h-screen">
        <div class="p-8" th:insert="${main}">
            <!-- content -->
        </div>
    </div>

</body>
</html>
