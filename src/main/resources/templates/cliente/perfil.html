<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head>
    <title>Mi perfil · PetLove</title>
</head>
<body>
<main>

    <div class="max-w-2xl mx-auto">

        <h1 class="font-display text-3xl font-bold text-gray-800 mb-8">Mi perfil</h1>

        <!-- Éxito / Error -->
        <div th:if="${exito}"
             class="mb-5 px-4 py-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm">
            Perfil actualizado correctamente.
        </div>
        <div th:if="${error}" th:text="${error}"
             class="mb-5 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
        </div>

        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">

            <!-- Avatar -->
            <div class="flex items-center gap-5 mb-8 pb-8 border-b border-gray-100">
                <div class="w-16 h-16 rounded-full bg-gradient-to-br from-primary-light to-primary
                            flex items-center justify-center text-white text-2xl font-display font-bold">
                    <span th:text="${#strings.substring(usuario.nombre,0,1)}">U</span>
                </div>
                <div>
                    <h2 class="font-semibold text-gray-800 text-lg"
                        th:text="${usuario.nombre} + ' ' + ${usuario.apellido}">Usuario</h2>
                    <p class="text-sm text-gray-500" th:text="${usuario.email}">email@ejemplo.com</p>
                    <span class="inline-block mt-1 px-2.5 py-0.5 bg-primary text-white text-xs font-medium rounded-full"
                          th:text="${usuario.rol}">CLIENTE</span>
                </div>
            </div>

            <!-- Formulario -->
            <form th:action="@{/perfil/actualizar}" th:object="${usuario}" method="post" class="space-y-5">

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
                        <input type="text" th:field="*{nombre}" required
                               class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      text-sm transition"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
                        <input type="text" th:field="*{apellido}" required
                               class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                      focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                      text-sm transition"/>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" th:field="*{email}" required
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                    <input type="text" th:field="*{telefono}" placeholder="+51 999 000 000"
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
                    <input type="text" th:field="*{direccion}" placeholder="Av. Los Olivos 123, Lima"
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>

                <button type="submit"
                        class="bg-primary hover:bg-primary-dark text-white font-semibold
                               px-6 py-2.5 rounded-lg transition-colors text-sm">
                    Guardar cambios
                </button>

            </form>
        </div>

        <!-- Cambiar contraseña -->
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 mt-5">
            <h2 class="font-display text-lg font-semibold text-gray-800 mb-5">Cambiar contraseña</h2>

            <form th:action="@{/perfil/cambiar-password}" method="post" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña actual</label>
                    <input type="password" name="passwordActual" required
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nueva contraseña</label>
                    <input type="password" name="passwordNueva" required
                           class="w-full px-4 py-2.5 rounded-lg border border-gray-200 bg-gray-50
                                  focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent
                                  text-sm transition"/>
                </div>
                <button type="submit"
                        class="text-sm font-semibold text-gray-600 border border-gray-200 px-5 py-2.5
                               rounded-lg hover:bg-gray-50 transition-colors">
                    Actualizar contraseña
                </button>
            </form>
        </div>

    </div>

</main>
</body>
</html>
