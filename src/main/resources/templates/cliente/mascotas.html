<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head>
    <title>Mis mascotas · PetLove</title>
</head>
<body>
<main>

    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="font-display text-3xl font-bold text-gray-800">Mis mascotas</h1>
            <p class="text-gray-500 text-sm mt-1">Gestiona el perfil de cada una.</p>
        </div>
        <a th:href="@{/mascotas/nueva}"
           class="bg-primary hover:bg-primary-dark text-white text-sm font-semibold
                  px-5 py-2.5 rounded-xl transition-colors">
            + Agregar mascota
        </a>
    </div>

    <!-- Vacío -->
    <div th:if="${#lists.isEmpty(mascotas)}"
         class="bg-white rounded-2xl border border-gray-100 shadow-sm p-16 text-center">
        <span class="text-6xl block mb-4">🐾</span>
        <h2 class="font-display text-xl font-semibold text-gray-700 mb-2">Sin mascotas aún</h2>
        <p class="text-gray-400 text-sm mb-6">Agrega a tu primera mascota para empezar.</p>
        <a th:href="@{/mascotas/nueva}"
           class="inline-block bg-primary hover:bg-primary-dark text-white text-sm font-semibold
                  px-6 py-2.5 rounded-xl transition-colors">
            Agregar mascota
        </a>
    </div>

    <!-- Grid de mascotas -->
    <div th:unless="${#lists.isEmpty(mascotas)}"
         class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">

        <div th:each="m : ${mascotas}"
             class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden
                    hover:shadow-md transition-shadow group">

            <!-- Header color -->
            <div class="h-24 bg-gradient-to-br from-primary-light to-primary flex items-center justify-center">
                <span class="text-5xl"
                      th:text="${m.especie == 'Gato'} ? '🐱' : (${m.especie == 'Perro'} ? '🐶' : '🐾')">🐾</span>
            </div>

            <!-- Info -->
            <div class="p-5">
                <h3 class="font-display text-lg font-semibold text-gray-800 group-hover:text-primary transition-colors"
                    th:text="${m.nombre}">Max</h3>
                <p class="text-sm text-gray-500 mt-0.5"
                   th:text="${m.especie} + ' · ' + ${m.raza}">Perro · Labrador</p>
                <p class="text-xs text-gray-400 mt-1"
                   th:text="'Nacimiento: ' + ${#temporals.format(m.fechaNacimiento, 'dd/MM/yyyy')}">Nacimiento</p>

                <div class="flex gap-2 mt-4">
                    <a th:href="@{/mascotas/{id}/editar(id=${m.id})}"
                       class="flex-1 text-center text-sm font-medium text-gray-600 border border-gray-200
                              py-1.5 rounded-lg hover:bg-gray-50 transition-colors">
                        Editar
                    </a>
                    <form th:action="@{/mascotas/{id}/eliminar(id=${m.id})}" method="post"
                          onsubmit="return confirm('¿Eliminar a ' + this.dataset.nombre + '?')"
                          th:data-nombre="${m.nombre}">
                        <button type="submit"
                                class="text-sm font-medium text-red-400 border border-red-100
                                       px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors">
                            ✕
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </div>

</main>
</body>
</html>
